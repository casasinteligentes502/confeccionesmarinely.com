<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950" width="1600" height="950">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="42%" stop-color="#f7efe0"/>
      <stop offset="100%" stop-color="#dff0e2"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b87318"/>
      <stop offset="42%" stop-color="#f4be4f"/>
      <stop offset="100%" stop-color="#c8871e"/>
    </linearGradient>

    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3d26"/>
      <stop offset="100%" stop-color="#3f9b63"/>
    </linearGradient>

    <radialGradient id="light" cx="64%" cy="26%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000000" flood-opacity=".20"/>
    </filter>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity=".14"/>
    </filter>

    <pattern id="fabric" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 9 H18 M9 0 V18" stroke="#ffffff" stroke-opacity=".16" stroke-width="1"/>
      <path d="M0 0 L18 18 M18 0 L0 18" stroke="#ffffff" stroke-opacity=".05" stroke-width="1"/>
    </pattern>

    <clipPath id="photoClip">
      <rect x="740" y="118" width="740" height="560" rx="46"/>
    </clipPath>
  </defs>

  <rect width="1600" height="950" fill="url(#bg)"/>
  <circle cx="1130" cy="165" r="520" fill="url(#light)"/>
  <path d="M1494 0 C1390 180 1390 420 1600 640 L1600 0 Z" fill="#153d28" opacity=".10"/>
  <path d="M0 810 C260 750 525 830 790 780 C1040 735 1270 640 1600 700 L1600 950 L0 950 Z" fill="#142018" opacity=".08"/>

  <!-- Decorative gold curve -->
  <path d="M621 -20 C510 192 520 445 668 667" fill="none" stroke="url(#gold)" stroke-width="34" stroke-linecap="round" opacity=".95"/>
  <path d="M653 -20 C548 187 560 417 694 620" fill="none" stroke="#fff" stroke-width="13" stroke-linecap="round" opacity=".52"/>

  <!-- Left information panel -->
  <g transform="translate(78 80)">
    <text x="0" y="65" font-family="Georgia, serif" font-size="98" fill="url(#gold)" font-style="italic">CM</text>
    <line x1="0" y1="92" x2="250" y2="92" stroke="#c58c24" stroke-width="2" opacity=".70"/>
    <text x="0" y="132" font-family="Georgia, serif" font-size="25" letter-spacing="9" fill="#161616">CONFECCIONES</text>
    <text x="0" y="190" font-family="Georgia, serif" font-size="63" letter-spacing="10" fill="#111111">MARINELY</text>

    <text x="0" y="296" font-family="Arial Black, Arial, sans-serif" font-size="60" fill="#101010">FACTORÍA TEXTIL</text>
    <text x="0" y="366" font-family="Arial Black, Arial, sans-serif" font-size="51" fill="url(#gold)">PROFESIONAL</text>
    <text x="0" y="426" font-family="Arial Black, Arial, sans-serif" font-size="43" fill="#2f7d4d">CON RESPONSABILIDAD</text>
    <text x="0" y="480" font-family="Arial Black, Arial, sans-serif" font-size="43" fill="#2f7d4d">ECOLÓGICA</text>

    <text x="0" y="552" font-family="Arial, sans-serif" font-size="30" fill="#333">Uniformes • Bordados • Serigrafía</text>
    <text x="0" y="592" font-family="Arial, sans-serif" font-size="30" fill="#333">Sublimación • Vinyl textil</text>

    <g transform="translate(0 655)">
      <rect x="0" y="0" width="470" height="78" rx="22" fill="#111"/>
      <text x="32" y="49" font-family="Arial Black, Arial, sans-serif" font-size="26" fill="#fff">MÁS DE 33 AÑOS EN GUATEMALA</text>
    </g>
  </g>

  <!-- Professional textile factory scene -->
  <g clip-path="url(#photoClip)" filter="url(#shadow)">
    <rect x="740" y="118" width="740" height="560" rx="46" fill="#f9f5ee"/>
    <rect x="740" y="118" width="740" height="560" fill="url(#fabric)" opacity=".55"/>

    <!-- back wall / windows -->
    <rect x="740" y="118" width="740" height="150" fill="#eaf1ef"/>
    <rect x="780" y="150" width="165" height="88" rx="12" fill="#cfe8f1"/>
    <rect x="970" y="150" width="165" height="88" rx="12" fill="#cfe8f1"/>
    <rect x="1160" y="150" width="260" height="88" rx="12" fill="#cfe8f1"/>
    <path d="M740 255 H1480" stroke="#c3c9c5" stroke-width="6"/>

    <!-- textile rolls -->
    <g transform="translate(792 318)">
      <ellipse cx="55" cy="35" rx="55" ry="35" fill="#b2d7bd"/>
      <rect x="55" y="0" width="180" height="70" fill="#79b78c"/>
      <ellipse cx="235" cy="35" rx="55" ry="35" fill="#5c9e70"/>
      <ellipse cx="55" cy="35" rx="28" ry="18" fill="#f2f7f2"/>
    </g>
    <g transform="translate(805 405)">
      <ellipse cx="50" cy="32" rx="50" ry="32" fill="#f0c66a"/>
      <rect x="50" y="0" width="200" height="64" fill="#d99b25"/>
      <ellipse cx="250" cy="32" rx="50" ry="32" fill="#bd821d"/>
      <ellipse cx="50" cy="32" rx="24" ry="15" fill="#fff5db"/>
    </g>
    <g transform="translate(800 486)">
      <ellipse cx="45" cy="29" rx="45" ry="29" fill="#d9d9d9"/>
      <rect x="45" y="0" width="170" height="58" fill="#222"/>
      <ellipse cx="215" cy="29" rx="45" ry="29" fill="#111"/>
      <ellipse cx="45" cy="29" rx="22" ry="14" fill="#fff"/>
    </g>

    <!-- sewing machine table -->
    <g transform="translate(1030 390)">
      <rect x="-12" y="94" width="410" height="38" rx="8" fill="#b67b2c"/>
      <rect x="8" y="132" width="18" height="140" fill="#3b2b20"/>
      <rect x="350" y="132" width="18" height="140" fill="#3b2b20"/>
      <path d="M55 35 H270 C322 35 350 72 350 107 H55 Z" fill="#fdfdfb" stroke="#141414" stroke-width="5"/>
      <rect x="105" y="4" width="135" height="42" rx="16" fill="#111"/>
      <circle cx="286" cy="70" r="25" fill="#202020"/>
      <path d="M326 98 C360 112 380 128 390 152" stroke="#111" stroke-width="6" fill="none"/>
      <path d="M68 110 C135 86 229 88 318 112" stroke="#d89a22" stroke-width="12" fill="none" opacity=".9"/>
    </g>

    <!-- workers simplified -->
    <g transform="translate(1175 300)">
      <circle cx="42" cy="38" r="31" fill="#c88a5a"/>
      <path d="M12 24 C25 -8 74 -3 81 31 C63 20 45 18 18 29 Z" fill="#262626"/>
      <path d="M0 88 C18 55 71 55 92 88 L108 198 H-12 Z" fill="#2f7d4d"/>
      <path d="M8 113 L-40 178" stroke="#c88a5a" stroke-width="16" stroke-linecap="round"/>
      <path d="M84 113 L132 178" stroke="#c88a5a" stroke-width="16" stroke-linecap="round"/>
    </g>

    <g transform="translate(1320 320)">
      <circle cx="39" cy="35" r="29" fill="#b97950"/>
      <path d="M8 26 C20 0 67 0 76 31 C54 19 33 20 10 31 Z" fill="#111"/>
      <path d="M0 85 C16 55 67 55 88 85 L100 190 H-8 Z" fill="#d89a22"/>
      <path d="M6 107 L-37 160" stroke="#b97950" stroke-width="14" stroke-linecap="round"/>
      <path d="M82 107 L128 160" stroke="#b97950" stroke-width="14" stroke-linecap="round"/>
    </g>

    <!-- hanging uniforms -->
    <g transform="translate(1185 160)">
      <line x1="0" y1="0" x2="245" y2="0" stroke="#333" stroke-width="7" stroke-linecap="round"/>
      <path d="M30 20 L75 20 L95 70 L80 210 L25 210 L10 70 Z" fill="#111"/>
      <path d="M110 20 L155 20 L178 70 L160 210 L103 210 L87 70 Z" fill="#f2f2f2" stroke="#ccc"/>
      <path d="M190 20 L235 20 L258 70 L240 210 L183 210 L167 70 Z" fill="#2f7d4d"/>
    </g>

    <!-- ecological corner -->
    <g transform="translate(1246 62)">
      <rect x="0" y="0" width="300" height="122" rx="0" fill="url(#green)" opacity=".95"/>
      <path d="M70 78 C26 50 33 20 70 16 C100 38 96 65 70 78Z" fill="#8fd16d"/>
      <path d="M92 80 C64 37 85 10 119 26 C123 58 114 76 92 80Z" fill="#9ee27a"/>
      <path d="M70 78 L94 46" stroke="#0f3d26" stroke-width="4"/>
      <text x="140" y="47" font-family="Arial Black, Arial, sans-serif" font-size="23" fill="#fff">ECOLOGÍA</text>
      <text x="140" y="82" font-family="Arial, sans-serif" font-size="18" fill="#eaffea">Producción responsable</text>
    </g>

    <!-- subtle overlay -->
    <rect x="740" y="118" width="740" height="560" rx="46" fill="none" stroke="#ffffff" stroke-width="8" opacity=".70"/>
  </g>

  <!-- bottom feature strip -->
  <g transform="translate(80 802)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1440" height="100" rx="30" fill="#171717"/>
    <g transform="translate(55 28)">
      <circle cx="25" cy="25" r="24" fill="none" stroke="url(#gold)" stroke-width="5"/>
      <path d="M25 10 C9 28 20 45 25 51 C30 45 41 28 25 10Z" fill="#d89a22"/>
      <text x="72" y="21" font-family="Arial Black, Arial, sans-serif" font-size="21" fill="#fff">COBERTURA</text>
      <text x="72" y="50" font-family="Arial, sans-serif" font-size="19" fill="#ddd">Guatemala</text>
    </g>

    <g transform="translate(395 28)">
      <circle cx="25" cy="25" r="24" fill="none" stroke="url(#gold)" stroke-width="5"/>
      <path d="M25 7 L45 17 V35 C39 47 32 52 25 55 C18 52 11 47 5 35 V17 Z" fill="#d89a22"/>
      <path d="M14 29 L22 38 L38 18" stroke="#111" stroke-width="5" fill="none"/>
      <text x="72" y="21" font-family="Arial Black, Arial, sans-serif" font-size="21" fill="#fff">CALIDAD</text>
      <text x="72" y="50" font-family="Arial, sans-serif" font-size="19" fill="#ddd">Acabados profesionales</text>
    </g>

    <g transform="translate(760 28)">
      <circle cx="25" cy="25" r="24" fill="none" stroke="url(#gold)" stroke-width="5"/>
      <path d="M8 35 H42 L35 14 H15 Z" fill="#d89a22"/>
      <path d="M16 35 L14 50 H36 L34 35" fill="#d89a22"/>
      <text x="72" y="21" font-family="Arial Black, Arial, sans-serif" font-size="21" fill="#fff">UNIFORMES</text>
      <text x="72" y="50" font-family="Arial, sans-serif" font-size="19" fill="#ddd">Industria, empresa y colegio</text>
    </g>

    <g transform="translate(1135 28)">
      <circle cx="25" cy="25" r="24" fill="none" stroke="url(#gold)" stroke-width="5"/>
      <path d="M25 9 C10 20 13 43 25 54 C37 43 40 20 25 9Z" fill="#2f7d4d"/>
      <path d="M25 17 V46 M25 34 C35 26 38 18 38 18 M25 39 C15 31 13 24 13 24" stroke="#fff" stroke-width="3" fill="none"/>
      <text x="72" y="21" font-family="Arial Black, Arial, sans-serif" font-size="21" fill="#fff">ECOLÓGICO</text>
      <text x="72" y="50" font-family="Arial, sans-serif" font-size="19" fill="#ddd">Compromiso sostenible</text>
    </g>
  </g>
</svg>